kind = "web"
previewPath = "/"
title = "Carbon Footprint Awareness Platform"
version = "1.0.0"
id = "artifacts/carbon-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23462

[services.development]
run = "pnpm --filter @workspace/carbon-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/carbon-platform", "run", "build" ]
publicDir = "artifacts/carbon-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23462"
BASE_PATH = "/"
